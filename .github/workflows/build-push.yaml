name: Build and Push Image

on:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  build-and-publish:
    name: Build and Push docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: ${{ github.ref }}

      - name: Setup Google Cloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCLOUD_AUTH }}
          project_id: artdock-api

      - name: Configure docker for artifact registry
        run: |
          gcloud auth configure-docker asia-docker.pkg.dev

      - name: set TAG
        run: |
          echo "TAG=$(echo $GITHUB_REF | awk -F/ '{print $NF}')" >> $GITHUB_ENV

      - name: Build
        run: |
          docker build -t asia-docker.pkg.dev/artdock-api/artdock-api/api:${{ env.TAG }} ./

      - name: Push
        run: |
          docker push asia-docker.pkg.dev/artdock-api/artdock-api/api:${{ env.TAG }}
